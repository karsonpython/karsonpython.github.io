<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>karsonnc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #0a0a0a;
      --card-bg: rgba(18, 18, 18, 0.8);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --text: #ffffff;
      --text-sub: #888888;
      --btn-bg: rgba(255, 255, 255, 0.04);
      --btn-border: rgba(255, 255, 255, 0.12);
      --btn-hover-bg: #ffffff;
      --btn-hover-text: #000000;
      --btn-hover-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
      --icon-color: #aaaaaa;
      --icon-hover: #000000;
      --toggle-bg: rgba(255, 255, 255, 0.1);
      --toggle-icon: #ffffff;
      --glow: rgba(255, 255, 255, 0.06);
      --footer: #444444;
      --dot-color: rgba(255, 255, 255, 0.5);
    }

    [data-theme="light"] {
      --bg: #f5f5f5;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(0, 0, 0, 0.08);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text: #000000;
      --text-sub: #666666;
      --btn-bg: rgba(0, 0, 0, 0.03);
      --btn-border: rgba(0, 0, 0, 0.12);
      --btn-hover-bg: #000000;
      --btn-hover-text: #ffffff;
      --btn-hover-shadow: 0 0 20px rgba(0, 0, 0, 0.12);
      --icon-color: #555555;
      --icon-hover: #ffffff;
      --toggle-bg: rgba(0, 0, 0, 0.08);
      --toggle-icon: #000000;
      --glow: rgba(0, 0, 0, 0.04);
      --footer: #aaaaaa;
      --dot-color: rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      overflow: hidden;
    }

    /* Animated background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: var(--toggle-bg);
      color: var(--toggle-icon);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .theme-toggle:hover {
      transform: rotate(180deg) scale(1.1);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      transition: opacity 0.3s;
    }

    .theme-toggle .sun { display: none; }
    .theme-toggle .moon { display: block; }
    [data-theme="light"] .theme-toggle .sun { display: block; }
    [data-theme="light"] .theme-toggle .moon { display: none; }

    /* Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 36px 40px;
      box-shadow: var(--card-shadow);
      text-align: center;
      transition: all var(--transition);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Profile picture */
    .pfp-wrapper {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;
    }

    .pfp-wrapper::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--text), transparent, var(--text));
      opacity: 0.2;
      animation: pfpGlow 4s ease-in-out infinite alternate;
    }

    @keyframes pfpGlow {
      0% { opacity: 0.1; transform: scale(1); }
      100% { opacity: 0.3; transform: scale(1.02); }
    }

    .pfp {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      border: 2px solid var(--card-border);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pfp:hover {
      transform: scale(1.05);
    }

    /* Username */
    .username {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .bio {
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 36px;
      transition: color var(--transition);
    }

    .bio span {
      color: var(--dot-color);
      margin: 0 6px;
    }

    /* Social buttons */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 14px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
      cursor: pointer;
    }

    .link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--btn-hover-bg);
      opacity: 0;
      transition: opacity 0.35s;
      border-radius: 14px;
    }

    .link:hover::before {
      opacity: 1;
    }

    .link:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: var(--btn-hover-shadow);
      border-color: transparent;
      color: var(--btn-hover-text);
    }

    .link svg,
    .link span {
      position: relative;
      z-index: 1;
    }

    .link svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      transition: color 0.35s;
      color: var(--icon-color);
    }

    .link:hover svg {
      color: var(--icon-hover);
    }

    /* Ripple effect */
    .link .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
      z-index: 2;
    }

    [data-theme="light"] .link .ripple {
      background: rgba(0, 0, 0, 0.15);
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* Staggered animation */
    .link:nth-child(1) { animation: linkIn 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .link:nth-child(2) { animation: linkIn 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .link:nth-child(3) { animation: linkIn 0.6s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

    @keyframes linkIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Footer */
    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: var(--footer);
      letter-spacing: 1px;
      transition: color var(--transition);
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .container {
        padding: 16px;
      }
      .card {
        padding: 40px 24px 32px;
        border-radius: 20px;
      }
      .theme-toggle {
        top: 16px;
        right: 16px;
      }
    }
  </style>
</head>

  <script>
    // Theme toggle with localStorage persistence
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    // Load saved theme
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      }
    })();

    // Ripple effect on buttons
    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('click', function(e) {
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });
  </script>
