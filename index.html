<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>karsonnc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ── */
    :root {
      /* Surfaces */
      --bg: #050505;
      --surface-1: rgba(12, 12, 12, 0.9);
      --surface-2: rgba(255, 255, 255, 0.03);
      --surface-3: rgba(255, 255, 255, 0.05);

      /* Borders */
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-medium: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.2);

      /* Text */
      --text-primary: #f0f0f0;
      --text-secondary: #808080;
      --text-tertiary: #4a4a4a;

      /* Accents */
      --accent-green: #22c55e;
      --accent-spotify: #1db954;
      --accent-discord: #5865F2;

      /* Spacing (8dp system) */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 32px;
      --space-8: 40px;
      --space-9: 48px;

      /* Animation */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;

      /* Elevation */
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px rgba(255, 255, 255, 0.06);

      /* Type scale */
      --text-xs: 11px;
      --text-sm: 13px;
      --text-base: 15px;
      --text-lg: 18px;
      --text-xl: 24px;
      --text-2xl: 28px;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      overflow-x: hidden;
      padding: var(--space-8) var(--space-5);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Reduced Motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Background Effects ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle,
        rgba(255, 255, 255, 0.035) 0%,
        rgba(255, 255, 255, 0.015) 30%,
        transparent 70%
      );
      animation: glowPulse 8s ease-in-out infinite alternate;
    }

    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -10%;
      left: 30%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle,
        rgba(88, 101, 242, 0.02) 0%,
        transparent 70%
      );
      animation: glowPulse 10s ease-in-out 2s infinite alternate;
    }

    @keyframes glowPulse {
      0% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      100% { opacity: 1; transform: translateX(-50%) scale(1.08); }
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* ── Custom Cursor ── */
    body, a, button { cursor: none !important; }

    .cursor-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--text-primary);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width var(--duration-fast), height var(--duration-fast);
      will-change: left, top;
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width var(--duration-normal) var(--ease-spring),
                  height var(--duration-normal) var(--ease-spring),
                  opacity var(--duration-normal);
      opacity: 0.35;
      will-change: left, top;
    }

    .cursor-dot.hovering { width: 10px; height: 10px; }
    .cursor-ring.hovering { width: 52px; height: 52px; opacity: 0.15; }

    @media (pointer: coarse) {
      .cursor-dot, .cursor-ring { display: none; }
      body, a, button { cursor: auto !important; }
    }

    /* ── Container ── */
    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface-1);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid var(--border-subtle);
      border-radius: 28px;
      padding: var(--space-9) var(--space-7) var(--space-8);
      text-align: center;
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      animation: cardIn 0.9s var(--ease-out) forwards;
      opacity: 0;
      transform: translateY(24px) scale(0.98);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Profile Picture + Rainbow Ring ── */
    .pfp-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto var(--space-6);
    }

    .pfp-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #ff3333, #ff8833, #ffee33, #33ff66,
        #33ddff, #5566ff, #aa33ff, #ff33aa, #ff3333
      );
      animation: ringRotate 3.5s linear infinite;
      z-index: 0;
      filter: blur(0.5px);
    }

    .pfp-ring::after {
      content: '';
      position: absolute;
      inset: 3.5px;
      border-radius: 50%;
      background: var(--bg);
    }

    /* Outer glow from the ring */
    .pfp-ring-glow {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(255,51,51,0.15), rgba(255,136,51,0.15), rgba(255,238,51,0.15),
        rgba(51,255,102,0.15), rgba(51,221,255,0.15), rgba(85,102,255,0.15),
        rgba(170,51,255,0.15), rgba(255,51,170,0.15), rgba(255,51,51,0.15)
      );
      animation: ringRotate 3.5s linear infinite;
      filter: blur(20px);
      z-index: -1;
      opacity: 0.6;
    }

    @keyframes ringRotate {
      to { transform: rotate(360deg); }
    }

    .pfp {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      border: 3px solid var(--bg);
      transition: transform var(--duration-slow) var(--ease-spring);
    }

    .pfp:hover {
      transform: scale(1.06);
    }

    /* Status dot */
    .status-dot {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 18px;
      height: 18px;
      background: var(--accent-green);
      border-radius: 50%;
      border: 3px solid var(--bg);
      z-index: 2;
    }

    .status-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--accent-green);
      opacity: 0;
      animation: statusPulse 2.5s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(2.2); }
    }

    /* ── Username + Badges ── */
    .username-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-1);
    }

    .username {
      font-size: var(--text-2xl);
      font-weight: 800;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .badges {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .badge {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: opacity var(--duration-fast);
    }

    .badge:hover { opacity: 0.85; }

    .badge svg {
      width: 15px;
      height: 15px;
    }

    .bio {
      color: var(--text-secondary);
      font-size: var(--text-sm);
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: var(--space-4);
      line-height: 1.6;
    }

    /* ── Copy Discord Button ── */
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 7px var(--space-4);
      border-radius: 100px;
      border: 1px solid var(--border-medium);
      background: var(--surface-2);
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: none;
      transition: all var(--duration-normal) var(--ease-out);
      margin-bottom: var(--space-7);
    }

    .copy-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
      background: var(--surface-3);
      transform: translateY(-1px);
    }

    .copy-btn:active {
      transform: scale(0.97);
    }

    .copy-btn.copied {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: rgba(34, 197, 94, 0.06);
    }

    .copy-btn svg {
      width: 12px;
      height: 12px;
    }

    /* ── Social Icons Row ── */
    .social-icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .social-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all var(--duration-normal) var(--ease-spring);
      cursor: none;
      position: relative;
      overflow: hidden;
    }

    .social-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      transition: opacity var(--duration-normal);
    }

    .social-icon:hover::before {
      opacity: 1;
    }

    .social-icon:hover {
      color: #000;
      border-color: transparent;
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 12px 32px rgba(255, 255, 255, 0.08);
    }

    .social-icon:active {
      transform: translateY(-2px) scale(1.02);
    }

    .social-icon svg {
      width: 20px;
      height: 20px;
      position: relative;
      z-index: 1;
    }

    /* Staggered social icon animation */
    .social-icon:nth-child(1) { animation: socialIn 0.5s 0.3s var(--ease-out) forwards; opacity: 0; }
    .social-icon:nth-child(2) { animation: socialIn 0.5s 0.35s var(--ease-out) forwards; opacity: 0; }
    .social-icon:nth-child(3) { animation: socialIn 0.5s 0.4s var(--ease-out) forwards; opacity: 0; }

    @keyframes socialIn {
      from { opacity: 0; transform: translateY(8px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Discord Presence Widget ── */
    .discord-presence {
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-7);
      transition: all var(--duration-normal) var(--ease-out);
      animation: fadeSlideIn 0.6s 0.5s var(--ease-out) forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes fadeSlideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .discord-presence:hover {
      border-color: rgba(88, 101, 242, 0.25);
      background: rgba(88, 101, 242, 0.04);
      box-shadow: 0 4px 24px rgba(88, 101, 242, 0.06);
    }

    .discord-avatar {
      position: relative;
      flex-shrink: 0;
    }

    .discord-avatar img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
    }

    .discord-avatar .presence-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 14px;
      height: 14px;
      background: var(--accent-green);
      border-radius: 50%;
      border: 3px solid #0c0c0c;
    }

    .discord-info {
      flex: 1;
      text-align: left;
      min-width: 0;
    }

    .discord-name {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: var(--space-2);
      line-height: 1.3;
    }

    .discord-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(88, 101, 242, 0.15);
      color: #8b9eff;
      text-transform: uppercase;
    }

    .discord-status {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .discord-icon {
      flex-shrink: 0;
      opacity: 0.3;
      transition: opacity var(--duration-fast);
    }

    .discord-presence:hover .discord-icon {
      opacity: 0.6;
    }

    .discord-icon svg {
      width: 22px;
      height: 22px;
    }

    /* ── Section Divider ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      margin-top: var(--space-1);
    }

    .section-label span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    /* ── Track List ── */
    .track-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .track {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-3);
      border-radius: 12px;
      transition: background var(--duration-fast);
      text-align: left;
      cursor: none;
      animation: trackIn 0.5s var(--ease-out) forwards;
      opacity: 0;
    }

    .track:nth-child(1) { animation-delay: 0.55s; }
    .track:nth-child(2) { animation-delay: 0.6s; }
    .track:nth-child(3) { animation-delay: 0.65s; }
    .track:nth-child(4) { animation-delay: 0.7s; }

    @keyframes trackIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .track:hover {
      background: var(--surface-2);
    }

    .track-num {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-tertiary);
      min-width: 18px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .track-play {
      display: none;
      min-width: 18px;
      justify-content: center;
      color: var(--accent-spotify);
    }

    .track-play svg { width: 16px; height: 16px; }

    .track:hover .track-num { display: none; }
    .track:hover .track-play { display: flex; }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .track-artist {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    /* Spotify embed */
    .track-embed {
      max-height: 0;
      overflow: hidden;
      transition: max-height var(--duration-slow) var(--ease-out),
                  opacity var(--duration-normal),
                  margin var(--duration-normal);
      opacity: 0;
      margin-top: 0;
      border-radius: 12px;
    }

    .track-embed.active {
      max-height: 100px;
      opacity: 1;
      margin-top: var(--space-2);
    }

    .track-embed iframe {
      border-radius: 12px;
      width: 100%;
      height: 80px;
      border: none;
    }

    /* Equalizer */
    .track-eq {
      display: none;
      align-items: flex-end;
      gap: 2px;
      min-width: 18px;
      height: 14px;
      justify-content: center;
    }

    .track.playing .track-num { display: none; }
    .track.playing .track-play { display: none; }
    .track.playing .track-eq { display: flex; }

    .track-eq span {
      width: 3px;
      background: var(--accent-spotify);
      border-radius: 2px;
      animation: eq 0.8s ease-in-out infinite alternate;
    }

    .track-eq span:nth-child(1) { height: 60%; animation-delay: 0s; }
    .track-eq span:nth-child(2) { height: 100%; animation-delay: 0.2s; }
    .track-eq span:nth-child(3) { height: 40%; animation-delay: 0.4s; }

    @keyframes eq {
      0% { height: 20%; }
      100% { height: 100%; }
    }

    /* ── Stats Row ── */
    .stats-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-top: var(--space-7);
      padding-top: var(--space-5);
      border-top: 1px solid var(--border-subtle);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
    }

    .stat svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    /* ── Page Transition ── */
    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      overflow: hidden;
    }

    .page-transition .bar {
      position: absolute;
      top: 0;
      width: 20%;
      height: 100%;
      background: var(--text-primary);
      transform: scaleY(0);
      transform-origin: bottom;
    }

    .page-transition .bar:nth-child(1) { left: 0%; }
    .page-transition .bar:nth-child(2) { left: 20%; }
    .page-transition .bar:nth-child(3) { left: 40%; }
    .page-transition .bar:nth-child(4) { left: 60%; }
    .page-transition .bar:nth-child(5) { left: 80%; }

    .page-transition.active .bar {
      animation: barUp 0.5s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }

    .page-transition.active .bar:nth-child(1) { animation-delay: 0s; }
    .page-transition.active .bar:nth-child(2) { animation-delay: 0.04s; }
    .page-transition.active .bar:nth-child(3) { animation-delay: 0.08s; }
    .page-transition.active .bar:nth-child(4) { animation-delay: 0.12s; }
    .page-transition.active .bar:nth-child(5) { animation-delay: 0.16s; }

    @keyframes barUp {
      0% { transform: scaleY(0); transform-origin: bottom; }
      50% { transform: scaleY(1); transform-origin: bottom; }
      50.1% { transform: scaleY(1); transform-origin: top; }
      100% { transform: scaleY(0); transform-origin: top; }
    }

    /* ── Focus States (Accessibility) ── */
    .social-icon:focus-visible,
    .copy-btn:focus-visible,
    .track:focus-visible {
      outline: 2px solid var(--accent-discord);
      outline-offset: 3px;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { padding: var(--space-5) var(--space-4); }
      .card {
        padding: var(--space-8) var(--space-5) var(--space-7);
        border-radius: 24px;
      }
      .username { font-size: var(--text-xl); }
      .social-icons { gap: var(--space-3); }
      .social-icon { width: 44px; height: 44px; }
      .social-icon svg { width: 18px; height: 18px; }
      .pfp-wrapper { width: 100px; height: 100px; }
      .pfp { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>

  <!-- Background glow -->
  <div class="bg-glow"></div>

  <!-- Custom Cursor -->

  <script>
    // ── Custom cursor ──
    const dot = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');
    let mouseX = -100, mouseY = -100;
    let ringX = -100, ringY = -100;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      dot.style.left = mouseX + 'px';
      dot.style.top = mouseY + 'px';
    });

    (function animateRing() {
      ringX += (mouseX - ringX) * 0.12;
      ringY += (mouseY - ringY) * 0.12;
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    })();

    document.querySelectorAll('a, button, .track, .copy-btn').forEach(el => {
      el.addEventListener('mouseenter', () => {
        dot.classList.add('hovering');
        ring.classList.add('hovering');
      });
      el.addEventListener('mouseleave', () => {
        dot.classList.remove('hovering');
        ring.classList.remove('hovering');
      });
    });

    // ── Copy username ──
    function copyUsername() {
      navigator.clipboard.writeText('6zei').then(() => {
        const btn = document.getElementById('copyBtn');
        const text = document.getElementById('copyText');
        btn.classList.add('copied');
        text.textContent = 'Copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          text.textContent = '6zei';
        }, 1500);
      });
    }

    // ── Page transition on social icon clicks ──
    document.querySelectorAll('.social-icon').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.href;
        const transition = document.getElementById('pageTransition');
        transition.classList.add('active');
        setTimeout(() => window.open(href, '_blank'), 500);
        setTimeout(() => transition.classList.remove('active'), 1000);
      });
    });

    // ── Spotify track preview ──
    let activeEmbed = null;

    document.querySelectorAll('.track').forEach((track, index) => {
      const spotifyId = track.getAttribute('data-spotify');
      const embedContainer = document.getElementById('embed-' + index);

      track.addEventListener('click', () => {
        if (activeEmbed && activeEmbed !== embedContainer) {
          activeEmbed.innerHTML = '';
          activeEmbed.classList.remove('active');
          document.querySelectorAll('.track.playing').forEach(t => t.classList.remove('playing'));
        }

        if (!embedContainer.classList.contains('active')) {
          embedContainer.innerHTML = '<iframe src="https://open.spotify.com/embed/track/' + spotifyId + '?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
          embedContainer.classList.add('active');
          track.classList.add('playing');
          activeEmbed = embedContainer;
        } else {
          embedContainer.innerHTML = '';
          embedContainer.classList.remove('active');
          track.classList.remove('playing');
          activeEmbed = null;
        }
      });
    });

    // ── View counter (localStorage) ──
    (function() {
      let views = parseInt(localStorage.getItem('karsonnc_views') || '0', 10);
      views++;
      localStorage.setItem('karsonnc_views', views);

      const el = document.getElementById('viewCount');
      const target = views;
      const duration = 1000;
      const start = performance.now();

      (function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.floor(eased * target).toLocaleString();
        if (progress < 1) requestAnimationFrame(tick);
      })(performance.now());
    })();
  </script>
