<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>karsonnc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #0a0a0a;
      --card-bg: rgba(18, 18, 18, 0.8);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --text: #ffffff;
      --text-sub: #888888;
      --btn-bg: rgba(255, 255, 255, 0.04);
      --btn-border: rgba(255, 255, 255, 0.12);
      --btn-hover-bg: #ffffff;
      --btn-hover-text: #000000;
      --btn-hover-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
      --icon-color: #aaaaaa;
      --icon-hover: #000000;
      --toggle-bg: rgba(255, 255, 255, 0.1);
      --toggle-icon: #ffffff;
      --glow: rgba(255, 255, 255, 0.06);
      --footer: #444444;
      --dot-color: rgba(255, 255, 255, 0.5);
      --track-num: #555555;
      --copy-success: rgba(255, 255, 255, 0.15);
      --section-border: rgba(255, 255, 255, 0.06);
    }

    [data-theme="light"] {
      --bg: #f5f5f5;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(0, 0, 0, 0.08);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text: #000000;
      --text-sub: #666666;
      --btn-bg: rgba(0, 0, 0, 0.03);
      --btn-border: rgba(0, 0, 0, 0.12);
      --btn-hover-bg: #000000;
      --btn-hover-text: #ffffff;
      --btn-hover-shadow: 0 0 20px rgba(0, 0, 0, 0.12);
      --icon-color: #555555;
      --icon-hover: #ffffff;
      --toggle-bg: rgba(0, 0, 0, 0.08);
      --toggle-icon: #000000;
      --glow: rgba(0, 0, 0, 0.04);
      --footer: #aaaaaa;
      --dot-color: rgba(0, 0, 0, 0.5);
      --track-num: #bbbbbb;
      --copy-success: rgba(0, 0, 0, 0.08);
      --section-border: rgba(0, 0, 0, 0.06);
    }

    /* Custom cursor */
    body, a, button { cursor: none !important; }

    .cursor-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--text);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--text);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.25s, height 0.25s, border-color 0.25s, opacity 0.25s;
      opacity: 0.4;
    }

    .cursor-dot.hovering {
      width: 10px;
      height: 10px;
    }

    .cursor-ring.hovering {
      width: 50px;
      height: 50px;
      opacity: 0.2;
    }

    /* Hide custom cursor on touch devices */
    @media (pointer: coarse) {
      .cursor-dot, .cursor-ring { display: none; }
      body, a, button { cursor: auto !important; }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 40px 0;
    }

    /* Animated background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Page transition overlay */
    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      overflow: hidden;
    }

    .page-transition .bar {
      position: absolute;
      top: 0;
      width: 20%;
      height: 100%;
      background: var(--text);
      transform: scaleY(0);
      transform-origin: bottom;
    }

    .page-transition .bar:nth-child(1) { left: 0%; }
    .page-transition .bar:nth-child(2) { left: 20%; }
    .page-transition .bar:nth-child(3) { left: 40%; }
    .page-transition .bar:nth-child(4) { left: 60%; }
    .page-transition .bar:nth-child(5) { left: 80%; }

    .page-transition.active .bar {
      animation: barUp 0.5s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }

    .page-transition.active .bar:nth-child(1) { animation-delay: 0s; }
    .page-transition.active .bar:nth-child(2) { animation-delay: 0.05s; }
    .page-transition.active .bar:nth-child(3) { animation-delay: 0.1s; }
    .page-transition.active .bar:nth-child(4) { animation-delay: 0.15s; }
    .page-transition.active .bar:nth-child(5) { animation-delay: 0.2s; }

    @keyframes barUp {
      0% { transform: scaleY(0); transform-origin: bottom; }
      50% { transform: scaleY(1); transform-origin: bottom; }
      50.1% { transform: scaleY(1); transform-origin: top; }
      100% { transform: scaleY(0); transform-origin: top; }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: var(--toggle-bg);
      color: var(--toggle-icon);
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .theme-toggle:hover {
      transform: rotate(180deg) scale(1.1);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      transition: opacity 0.3s;
    }

    .theme-toggle .sun { display: none; }
    .theme-toggle .moon { display: block; }
    [data-theme="light"] .theme-toggle .sun { display: block; }
    [data-theme="light"] .theme-toggle .moon { display: none; }

    /* Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 36px 40px;
      box-shadow: var(--card-shadow);
      text-align: center;
      transition: all var(--transition);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Profile picture */
    .pfp-wrapper {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;
    }

    .pfp-wrapper::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--text), transparent, var(--text));
      opacity: 0.2;
      animation: pfpGlow 4s ease-in-out infinite alternate;
    }

    @keyframes pfpGlow {
      0% { opacity: 0.1; transform: scale(1); }
      100% { opacity: 0.3; transform: scale(1.02); }
    }

    .pfp {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      border: 2px solid var(--card-border);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pfp:hover {
      transform: scale(1.05);
    }

    /* Status indicator */
    .status-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 16px;
      height: 16px;
      background: #22c55e;
      border-radius: 50%;
      border: 3px solid var(--bg);
      z-index: 2;
      transition: border-color var(--transition);
    }

    .status-dot::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: #22c55e;
      opacity: 0;
      animation: statusPulse 2s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.8); }
    }

    /* Username */
    .username {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .bio {
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      transition: color var(--transition);
    }

    .bio span {
      color: var(--dot-color);
      margin: 0 6px;
    }

    /* Copy username button */
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text-sub);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.5px;
      cursor: none;
      transition: all 0.3s;
      margin-bottom: 30px;
    }

    .copy-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .copy-btn.copied {
      background: var(--copy-success);
      border-color: #22c55e;
      color: #22c55e;
    }

    .copy-btn svg {
      width: 13px;
      height: 13px;
    }

    /* Section divider */
    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      margin-top: 8px;
    }

    .section-label span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--section-border);
    }

    /* Social buttons */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 14px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
      cursor: none;
    }

    .link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--btn-hover-bg);
      opacity: 0;
      transition: opacity 0.35s;
      border-radius: 14px;
    }

    .link:hover::before {
      opacity: 1;
    }

    .link:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: var(--btn-hover-shadow);
      border-color: transparent;
      color: var(--btn-hover-text);
    }

    .link svg,
    .link span {
      position: relative;
      z-index: 1;
    }

    .link svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      transition: color 0.35s;
      color: var(--icon-color);
    }

    .link:hover svg {
      color: var(--icon-hover);
    }

    /* Ripple effect */
    .link .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
      z-index: 2;
    }

    [data-theme="light"] .link .ripple {
      background: rgba(0, 0, 0, 0.15);
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* Staggered animation for links */
    .link:nth-child(1) { animation: linkIn 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .link:nth-child(2) { animation: linkIn 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .link:nth-child(3) { animation: linkIn 0.6s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

    @keyframes linkIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Top Tracks */
    .tracks {
      margin-top: 28px;
    }

    .track-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      transition: background 0.25s;
      text-align: left;
      animation: trackIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .track:nth-child(1) { animation-delay: 0.5s; }
    .track:nth-child(2) { animation-delay: 0.6s; }
    .track:nth-child(3) { animation-delay: 0.7s; }
    .track:nth-child(4) { animation-delay: 0.8s; }

    @keyframes trackIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .track:hover {
      background: var(--btn-bg);
    }

    .track-num {
      font-size: 13px;
      font-weight: 600;
      color: var(--track-num);
      min-width: 18px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .track-eq {
      display: none;
      align-items: flex-end;
      gap: 2px;
      min-width: 18px;
      height: 14px;
      justify-content: center;
    }

    .track:hover .track-num { display: none; }
    .track:hover .track-eq { display: flex; }

    .track-eq span {
      width: 3px;
      background: var(--text);
      border-radius: 2px;
      animation: eq 0.8s ease-in-out infinite alternate;
    }

    .track-eq span:nth-child(1) { height: 60%; animation-delay: 0s; }
    .track-eq span:nth-child(2) { height: 100%; animation-delay: 0.2s; }
    .track-eq span:nth-child(3) { height: 40%; animation-delay: 0.4s; }

    @keyframes eq {
      0% { height: 20%; }
      100% { height: 100%; }
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Footer */
    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: var(--footer);
      letter-spacing: 1px;
      transition: color var(--transition);
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .container { padding: 16px; }
      .card {
        padding: 40px 24px 32px;
        border-radius: 20px;
      }
      .theme-toggle {
        top: 16px;
        right: 16px;
      }
    }
  </style>
</head>

  <script>
    // ── Theme toggle ──
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();

    // ── Custom cursor ──
    const dot = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');
    let mouseX = -100, mouseY = -100;
    let ringX = -100, ringY = -100;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      dot.style.left = mouseX + 'px';
      dot.style.top = mouseY + 'px';
    });

    function animateRing() {
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    // Cursor hover state
    document.querySelectorAll('a, button, .track, .copy-btn').forEach(el => {
      el.addEventListener('mouseenter', () => {
        dot.classList.add('hovering');
        ring.classList.add('hovering');
      });
      el.addEventListener('mouseleave', () => {
        dot.classList.remove('hovering');
        ring.classList.remove('hovering');
      });
    });

    // ── Hover sound (Web Audio API) ──
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playHoverSound() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.12);
    }

    function playClickSound() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    }

    // Attach hover sounds to interactive elements
    document.querySelectorAll('.link, .theme-toggle, .copy-btn, .track').forEach(el => {
      el.addEventListener('mouseenter', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        playHoverSound();
      });
    });

    // ── Copy username ──
    function copyUsername() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      playClickSound();
      navigator.clipboard.writeText('6zei').then(() => {
        const btn = document.getElementById('copyBtn');
        const text = document.getElementById('copyText');
        btn.classList.add('copied');
        text.textContent = 'Copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          text.textContent = '6zei';
        }, 1500);
      });
    }

    // ── Ripple effect ──
    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('click', function(e) {
        playClickSound();
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });

    // ── Page transition on external links ──
    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.href;
        const transition = document.getElementById('pageTransition');
        transition.classList.add('active');
        setTimeout(() => {
          window.open(href, '_blank');
        }, 500);
        setTimeout(() => {
          transition.classList.remove('active');
        }, 1000);
      });
    });
  </script>
